<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloco de notas do Marquinho 📝</title>
    
    <!-- AQUI FICA O ESTILO (CSS) -->
    <style>
        /* Configurações básicas */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121214;
            color: #e1e1e6;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: #04d361;
            margin-bottom: 5px;
        }

        header p {
            color: #8f8f9d;
            font-size: 0.9rem;
        }

        /* Formulário de criar nota */
        .form-nota {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 40px;
        }

        textarea {
            width: 100%;
            height: 120px;
            background-color: #202024;
            border: 2px solid #29292e;
            border-radius: 8px;
            color: #fff;
            padding: 15px;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #04d361;
        }

        #btn-salvar {
            background-color: #04d361;
            color: #121214;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #btn-salvar:hover {
            background-color: #00b34d;
        }

        /* Grid de Notas Salvas */
        .lista-notas {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card-nota {
            background-color: #202024;
            border: 1px solid #29292e;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card-nota p {
            line-height: 1.5;
            color: #c4c4cc;
            white-space: pre-wrap; /* Mantém as quebras de linha do texto */
        }

        .btn-deletar {
            align-self: flex-end;
            background: none;
            border: 1px solid #f75a68;
            color: #f75a68;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .btn-deletar:hover {
            background-color: #f75a68;
            color: #fff;
        }
    </style>
</head>
<body>

    <!-- AQUI FICA A ESTRUTURA (HTML) -->
    <div class="container">
        <header>
            <h1>Bloco de notas 📝</h1>
            <p>Conectado ao Client-Side pronto para o Back-End!</p>
        </header>

        <section class="form-nota">
            <textarea id="texto-nota" placeholder="Digite sua nota aqui, Marquinho..."></textarea>
            <button id="btn-salvar">Salvar Nota 💾</button>
        </section>

        <section class="lista-notas" id="container-notas">
            <!-- As notas do JavaScript vão entrar aqui dentro automaticamente -->
        </section>
    </div>

    <!-- AQUI FICA A LÓGICA (JAVASCRIPT) -->
    <script>
        // Selecionando os elementos do HTML
        const textoNota = document.getElementById('texto-nota');
        const btnSalvar = document.getElementById('btn-salvar');
        const containerNotas = document.getElementById('container-notas');

        // URL do servidor Python do seu amigo (quando ele estiver rodando)
        const URL_API = 'http://localhost:5000'; 

        // 1. Função para carregar as notas vindas do servidor do seu amigo
        async function carregarNotas() {
            try {
                const resposta = await fetch(`${URL_API}/notas`);
                const notas = await resposta.json();
                
                containerNotas.innerHTML = ''; // Limpa a tela antes de redesenhar
                
                notas.forEach(nota => {
                    criarCardNota(nota.id, nota.texto);
                });
            } catch (erro) {
                // Se o servidor Python não estiver ligado, mostra esse aviso no console
                console.log("Servidor offline, aguardando conexão com o Python... 🐍");
            }
        }

        // 2. Função para disparar a nova nota para o servidor dele
        btnSalvar.addEventListener('click', async () => {
            const texto = textoNota.value.trim();
            if (!texto) return alert("Escreva algo antes de salvar! 📝");

            try {
                await fetch(`${URL_API}/salvar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texto: texto })
                });

                textoNota.value = ''; // Limpa o campo de texto
                carregarNotas();     // Atualiza a lista com a nova nota
            } catch (erro) {
                alert("Ops! Não deu para salvar porque o servidor Python do seu amigo está desligado. 📉");
            }
        });

        // 3. Função para desenhar a nota bonitinha na tela (HTML dinâmico)
        function criarCardNota(id, texto) {
            const card = document.createElement('div');
            card.className = 'card-nota';
            card.innerHTML = `
                <p>${texto}</p>
                <button class="btn-deletar" onclick="deletarNota(${id})">Excluir 🗑️</button>
            `;
            containerNotas.appendChild(card);
        }

        // 4. Função para avisar o servidor dele para deletar uma nota
        async function deletarNota(id) {
            try {
                await fetch(`${URL_API}/deletar/${id}`, { method: 'DELETE' });
                carregarNotas(); // Atualiza a tela
            } catch (erro) {
                alert("Não foi possível deletar. O servidor Python caiu?");
            }
        }

        // Fica rodando em segundo plano tentando buscar as notas do back-end
        carregarNotas();
    </script>
</body>
</html>
